# CodeRabbit Configuration
# https://docs.coderabbit.ai/guides/configure-coderabbit

language: ja-JP

reviews:
  # Issue #327: CodeRabbit を停止し merge gate を vibehawk の status check 単独に一本化したため
  # 自動レビューを無効化する（App が installed のままでも PR に自動レビューを post しない）。
  auto_review:
    enabled: false
    drafts: false
    auto_incremental_review: false
    base_branches:
      - ".*"

  request_changes_workflow: false

  auto_resolve:
    enabled: false

  path_filters:
    - "!*.lock"
    - "!.git/**"
    - "!node_modules/**"
    - "!dist/**"
    - "!build/**"
    - "!.cache/**"
    - "!vendor/**"

  path_instructions:
    - path: "**"
      instructions: |
        PR that corresponds to an Issue must meet all requirements of the Issue.
        Identify the Issue number from the PR description or branch name,
        and verify that all items listed in the Issue are implemented.
        If any requirements are not addressed, clearly point them out.

chat:
  # Issue #327: CodeRabbit 停止に伴いオンデマンド応答も無効化する。
  auto_reply: false
