# CodeRabbit Configuration
# https://docs.coderabbit.ai/guides/configure-coderabbit

language: ja-JP

reviews:
  auto_review:
    # Issue #164 検証期間中の一時停止（PR に CodeRabbit を挟ませない）。
    # 検証完了後は true に戻し、branch protection の required_status_checks にも
    # "CodeRabbit" を戻すこと。
    enabled: false
    drafts: false
    auto_incremental_review: true
    base_branches:
      - ".*"

  request_changes_workflow: true

  auto_resolve:
    enabled: true

  path_filters:
    - "!*.lock"
    - "!.git/**"
    - "!node_modules/**"
    - "!dist/**"
    - "!build/**"
    - "!.cache/**"
    - "!vendor/**"

  path_instructions:
    - path: "**"
      instructions: |
        PR that corresponds to an Issue must meet all requirements of the Issue.
        Identify the Issue number from the PR description or branch name,
        and verify that all items listed in the Issue are implemented.
        If any requirements are not addressed, clearly point them out.

chat:
  auto_reply: false
