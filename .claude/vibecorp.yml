# vibecorp.yml — プロジェクト設定
name: vibehawk
preset: full
language: ja
base_branch: main
protected_files:
  - MVV.md
coderabbit:
  enabled: true
claude_action:
  # Issue #532 以降、CodeRabbit Bot 単独運用のため無効化（autonomous-restrictions.md §6 参照）
  enabled: false
  skip_paths:
    - "*.lock"
    - ".git/**"
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - ".cache/**"
    - "vendor/**"
branch_protection:
  required_approvals: 1
diagnose:
  enabled: true
  # 1 run あたりの起票上限。課金超過防止のため意図的に抑制（docs/cost-analysis.md 参照）
  max_issues_per_run: 7
  # 1 日あたりの起票上限（= max_issues_per_run × 2）
  max_issues_per_day: 14
  max_files_per_issue: 10
  scope: ""
  forbidden_targets:
    - "skills/**"
    - "hooks/*.sh"
    - "vibecorp.yml"
    - "MVV.md"
    - "SECURITY.md"
    - "POLICY.md"
plan:
  review_agents:
    - architect
    - security
    - testing
    - performance
    - dx
    - cost
    - legal
