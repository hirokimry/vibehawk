name: shellcheck

on:
  push:
  # Issue #135 と同等のトリガ設計: 再レビュー依頼で CI も再発火するよう
  # types を明示する。
  pull_request:
    types: [opened, synchronize, reopened, review_requested]

concurrency:
  group: shellcheck-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    # bash を明示（ubuntu-latest のデフォルトと一致するが、test.yml と同じ書式に揃える）
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck バージョン確認
        # ubuntu-latest には shellcheck がプリインストール済み
        run: shellcheck --version

      - name: scripts/ci/**/*.sh を走査（strict）
        # `scripts/ci/` 配下は **完了条件**「shellcheck が全 scripts/ci/**/*.sh で
        # pass」（Issue #175）を満たすため除外なしで走査する。
        run: |
          shopt -s globstar nullglob
          files=(scripts/ci/**/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "scripts/ci/ 配下にシェルがない（基盤未配置）"
            exit 1
          fi
          echo "scripts/ci/ 対象 ${#files[@]} 件:"
          printf '  %s\n' "${files[@]}"
          shellcheck --severity=warning --shell=bash "${files[@]}"

      - name: tests/test_*.sh を走査
        # tests/ は `.claude/rules/testing.md` の規約により本ジョブの走査対象に
        # 含める（完了条件「scripts/ci/**/*.sh と tests/test_*.sh を走査して
        # fail させる」）。ただし以下の 2 件は **JSON 文字列を export 経由で
        # 後段プロセスに env として渡す既存パターン**に対する shellcheck 側の
        # 過検出（false positive）であり、export された変数は word splitting の
        # 対象外であるため実害がない:
        #   - SC2089: Quotes/backslashes will be treated literally
        #   - SC2090: Quotes/backslashes in this variable will not be respected
        # これらは tests/ 配下にのみ適用し、scripts/ci/ には適用しない（上のステップ）。
        # 新規スクリプトでは `export VAR='value'` 形式（assign + export を 1 行に
        # まとめる）を推奨することで本除外に依存しないこと。
        run: |
          shopt -s globstar nullglob
          files=(tests/test_*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "tests/ 配下にテストがない"
            exit 1
          fi
          echo "tests/ 対象 ${#files[@]} 件:"
          printf '  %s\n' "${files[@]}"
          shellcheck --severity=warning --shell=bash --exclude=SC2089,SC2090 "${files[@]}"
