name: test

on:
  push:
  # Issue #135: 再レビュー依頼（"Re-request review" ボタン）時に CI も再発火するよう
  # types を明示。デフォルト [opened, synchronize, reopened] に review_requested を追加。
  pull_request:
    types: [opened, synchronize, reopened, review_requested]

concurrency:
  group: test-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    # Windows runner でも bash テストを実行するため、step のデフォルト shell を bash に固定
    # （Git Bash 経由、Issue #31）
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージのインストール
        # Issue #91: tests/test_setup_wizard.sh が @clack/prompts を require するため
        # CI runner でも node_modules を構築する。npm ci は package-lock.json と完全一致を要求するため、
        # CI 再現性の担保にも寄与する。
        run: npm ci

      - name: jq の確認
        run: jq --version

      - name: 全テスト実行
        run: bash scripts/ci/test/run-all-tests.sh

  # matrix ジョブの結果を集約し、Branch Protection の required check として機能する
  test:
    needs: test-matrix
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: 全 matrix ジョブの成功を確認
        env:
          MATRIX_RESULT: ${{ needs.test-matrix.result }}
        run: bash scripts/ci/test/verify-matrix-result.sh
