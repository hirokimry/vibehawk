name: Intent Label Issue Check

# Issue にも intent/* ラベル 1 つだけが付与されていることを機械的に強制する
# Issue #469 残 #3「intent ラベル不在 Issue/PR は CI/hook で必須化（fail）」の Issue 側実装
# Source of Truth: docs/conventional-commits.md, .claude/rules/intent-labels.md

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened]

permissions:
  issues: write

concurrency:
  group: intent-label-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  intent-label-check:
    name: Issue intent ラベル必須化チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 1 Issue 1 intent 厳守チェック
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: bash scripts/ci/intent-checks/intent-label-issue-check.sh
