name: PR Issue Link Check

# PR 本文に対応 Issue の参照（Refs / close / closes / fix / fixes / resolve / resolves）が
# 含まれていない場合に fail させる。
# Issue #469 残 #5「Issue 番号取れない PR は fail（Issue 経由起票必須）」の実装
# Source of Truth: docs/conventional-commits.md, .claude/rules/intent-labels.md

on:
  pull_request:
    types: [opened, edited, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-issue-link-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  issue-link-check:
    name: PR Issue 参照必須化チェック
    runs-on: ubuntu-latest
    # Fork PR は secrets が渡らないため除外（draft も除外でコスト抑制）
    if: github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft
    steps:
      - uses: actions/checkout@v4

      - name: PR 本文の Issue 参照チェック
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: bash scripts/ci/intent-checks/pr-issue-link-check.sh
