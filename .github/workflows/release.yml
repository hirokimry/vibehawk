name: release

# vibehawk CLI を npm registry に公開する workflow（Issue #30）
#
# CISO Critical 条件:
# - GitHub Actions OIDC 経由の publish のみ許可（手動 publish 禁止）
# - npm provenance 署名で改ざん検知（npm publish --provenance）
# - npm publish アカウントの 2FA 必須（npmjs.com Settings 側で設定）
#
# トリガー: GitHub Release 作成時のみ。push / PR では発火しない（誤 publish 防止）。

on:
  release:
    types: [published]

# 最小権限（autonomous-restrictions.md §6 例外: id-token: write は npm provenance 用 OIDC token 発行に必須）
permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          # OIDC trusted publishing は Node >= 22.14.0 / npm >= 11.5.1 を要求する（npm 公式 docs、Issue #321）
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: npm を OIDC trusted publishing 対応版へ更新（npm >= 11.5.1）
        # 要件 >= 11.5.1 を満たしつつメジャーを 11 に固定し、リリースの再現性を保つ（npm@latest だと
        # 将来のメジャー更新で OIDC 署名フロー変更にリリース時まで気付けないため）（Issue #321）
        run: npm install -g npm@^11.5.1

      - name: 依存パッケージのインストール
        # Issue #91: tests/test_setup_wizard.sh が @clack/prompts を require するため
        # CI runner でも node_modules を構築する。npm ci は package-lock.json と完全一致を要求するため、
        # CI 再現性の担保にも寄与する。
        run: npm ci

      - name: テスト実行
        run: bash scripts/ci/release/run-tests.sh

      - name: tag と package.json version の整合確認
        run: bash scripts/ci/release/verify-tag-version.sh

      - name: npm publish (provenance 付き、OIDC 経由)
        # OIDC trusted publishing: id-token: write で短寿命 token を取得するため NODE_AUTH_TOKEN は不要（Issue #321）
        run: npm publish --provenance --access public
