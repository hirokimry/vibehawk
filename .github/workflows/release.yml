name: release

# vibehawk CLI を npm registry に公開する workflow（Issue #30）
#
# CISO Critical 条件:
# - GitHub Actions OIDC 経由の publish のみ許可（手動 publish 禁止）
# - npm provenance 署名で改ざん検知（npm publish --provenance）
# - npm publish アカウントの 2FA 必須（npmjs.com Settings 側で設定）
#
# トリガー:
# - release: published … 人手が GitHub UI 等で作成した Release から発火する経路。
# - workflow_dispatch … release-tag.yml が自動作成した Release 向けの発火経路（Issue #333）。
#   GITHUB_TOKEN が作成した Release は release: published を発火させない（GitHub 公式仕様。
#   GITHUB_TOKEN 由来イベントは workflow_dispatch / repository_dispatch を除き新しい workflow を
#   起こさない）ため、release-tag.yml 側から本 workflow を workflow_dispatch で明示起動する。
# push / PR では発火しない（誤 publish 防止）。

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: publish 対象の tag（例: v0.2.0）
        required: true
        type: string

# 最小権限（autonomous-restrictions.md §6 例外: id-token: write は npm provenance 用 OIDC token 発行に必須）
permissions:
  contents: read
  id-token: write

concurrency:
  # release: published と workflow_dispatch のどちらの経路でも同一 tag を 1 グループに束ねる
  group: release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # release: published 経路は release.tag_name、workflow_dispatch 経路は inputs.tag を使う
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          # OIDC trusted publishing は Node >= 22.14.0 / npm >= 11.5.1 を要求する（npm 公式 docs、Issue #321）
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: npm を OIDC trusted publishing 対応版へ更新（npm >= 11.5.1）
        # 要件 >= 11.5.1 を満たしつつメジャーを 11 に固定し、リリースの再現性を保つ（npm@latest だと
        # 将来のメジャー更新で OIDC 署名フロー変更にリリース時まで気付けないため）（Issue #321）
        run: npm install -g npm@^11.5.1

      - name: 依存パッケージのインストール
        # Issue #91: tests/test_setup_wizard.sh が @clack/prompts を require するため
        # CI runner でも node_modules を構築する。npm ci は package-lock.json と完全一致を要求するため、
        # CI 再現性の担保にも寄与する。
        run: npm ci

      - name: テスト実行
        run: bash scripts/ci/release/run-tests.sh

      - name: tag と package.json version の整合確認
        run: bash scripts/ci/release/verify-tag-version.sh

      - name: npm publish (provenance 付き、OIDC 経由)
        # OIDC trusted publishing: id-token: write で短寿命 token を取得するため NODE_AUTH_TOKEN は不要（Issue #321）
        run: npm publish --provenance --access public
