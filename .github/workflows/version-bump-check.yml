name: Version Bump Check

# 製品ソース（cli/ / templates/ / package.json）が変更された PR で package.json の
# version が bump されていない場合に警告コメントを投稿する（Issue #308）。
#
# 設計方針（初期版は警告のみ・非ブロック）:
# - 検査ステップは continue-on-error: true で失敗しても緑で完了させる
# - required check には登録しない（マージブロックしない）
# - 警告コメントで利用者に気づかせ、手動で package.json を bump してもらう

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'cli/**'
      - 'templates/**'
      - 'package.json'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: version-bump-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  version-bump-check:
    name: package.json bump 漏れチェック
    runs-on: ubuntu-latest
    # Fork PR は secrets が渡らないため除外
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: チェックアウト（fetch-depth 0 で base 履歴も取得）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: bump 漏れ検査
        id: bump_check
        continue-on-error: true
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: bash .github/scripts/version-bump-check.sh "$BASE_REF" "HEAD"

      - name: bump 漏れ警告コメント投稿
        if: steps.bump_check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          OWNER: ${{ github.repository_owner }}
        run: bash .github/scripts/version-bump-check-comment.sh
