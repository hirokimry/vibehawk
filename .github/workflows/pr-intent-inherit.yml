name: PR Intent Label Inherit

# PR 作成時に対応 Issue の intent/* ラベルを自動的に PR にコピーする
# Issue #487: PR が Issue から intent ラベルを継承する機構
# Issue #469 で確定した「1 PR 1 intent 厳守」の運用補助

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-intent-inherit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  inherit-intent:
    name: Issue から intent ラベルを継承
    runs-on: ubuntu-latest
    # Fork PR では secrets が渡らないため除外（draft も除外でコスト抑制）
    if: github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft
    steps:
      - uses: actions/checkout@v4

      - name: 対応 Issue から intent ラベルを継承
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: bash scripts/ci/intent-checks/pr-intent-inherit.sh
